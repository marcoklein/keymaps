name: Build ZMK firmware

on:
  push:
    paths:
      - 'corne-zmk/**'
      - 'babbit36-zmk/**'
      - '.github/workflows/zmk-build.yml'
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      corne: ${{ steps.filter.outputs.corne }}
      babbit36: ${{ steps.filter.outputs.babbit36 }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            corne:
              - 'corne-zmk/**'
              - '.github/workflows/zmk-build.yml'
            babbit36:
              - 'babbit36-zmk/**'
              - '.github/workflows/zmk-build.yml'

  build-corne:
    needs: detect
    if: ${{ needs.detect.outputs.corne == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container: docker.io/zmkfirmware/zmk-dev-arm:stable
    steps:
      - uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/west
          key: zmk-west-${{ runner.os }}-corne-${{ hashFiles('corne-zmk/west.yml') }}
          restore-keys: zmk-west-${{ runner.os }}-corne-

      - name: Setup ZMK workspace
        run: |
          mkdir -p /workspace && cd /workspace
          git clone --depth 1 --branch v0.3 https://github.com/zmkfirmware/zmk
          cd zmk
          west init -l app
          west update

      - name: Build corne_left
        working-directory: /workspace/zmk
        run: |
          west build -s app -d build/left -b nice_nano_v2 -- \
            -DSHIELD=corne_left \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/corne-zmk/config"

      - name: Build corne_right
        working-directory: /workspace/zmk
        run: |
          west build -s app -d build/right -b nice_nano_v2 -- \
            -DSHIELD=corne_right \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/corne-zmk/config"

      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: corne-firmware
          path: |
            /workspace/zmk/build/left/zephyr/zmk.uf2
            /workspace/zmk/build/right/zephyr/zmk.uf2

  build-babbit36:
    needs: detect
    if: ${{ needs.detect.outputs.babbit36 == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container: docker.io/zmkfirmware/zmk-dev-arm:stable
    steps:
      - uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: ~/.cache/west
          key: zmk-west-${{ runner.os }}-babbit36-${{ hashFiles('babbit36-zmk/west.yml') }}
          restore-keys: zmk-west-${{ runner.os }}-babbit36-

      - name: Setup ZMK workspace
        run: |
          mkdir -p /workspace && cd /workspace
          git clone https://github.com/zmkfirmware/zmk
          cd zmk
          west init -l app
          west update

      - name: Build babbit36
        working-directory: /workspace/zmk
        run: |
          west build -s app -d build/babbit36 -b xiao_ble//zmk -- \
            -DSHIELD=babbit36 \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/babbit36-zmk/config"

      - name: Build settings_reset
        working-directory: /workspace/zmk
        run: |
          west build -s app -d build/settings_reset -b xiao_ble//zmk -- \
            -DSHIELD=settings_reset \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/babbit36-zmk/config"

      - name: Archive firmware
        uses: actions/upload-artifact@v4
        with:
          name: babbit36-firmware
          path: |
            /workspace/zmk/build/babbit36/zephyr/zmk.uf2
            /workspace/zmk/build/settings_reset/zephyr/zmk.uf2
